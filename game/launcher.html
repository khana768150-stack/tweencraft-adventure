<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TweenCraft Adventure</title>
<style>
* { margin: 0; padding: 0; }
body { background: #0a0a1a; width: 100vw; height: 100vh; overflow: hidden; }
iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<script>
const html = "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <link rel=\"manifest\" href=\"manifest.json\">\n  <meta name=\"theme-color\" content=\"#7c3aed\">\n  <meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n  <meta name=\"apple-mobile-web-app-status-bar-style\" content=\"black-translucent\">\n  <meta name=\"apple-mobile-web-app-title\" content=\"TweenCraft\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\" />\n  <title>TweenCraft Adventure</title>\n  <style>\n    * { margin: 0; padding: 0; box-sizing: border-box; }\n\n    body {\n      background: #0a0a1a;\n      font-family: 'Segoe UI', sans-serif;\n      overflow: hidden;\n      width: 100vw;\n      height: 100vh;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n    }\n\n    #gameContainer {\n      position: relative;\n      width: min(390px, 100vw);\n      height: min(844px, 100vh);\n      overflow: hidden;\n      border-radius: 24px;\n      box-shadow: 0 0 60px #7c3aed55, 0 0 120px #7c3aed22;\n      background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);\n    }\n\n    canvas {\n      position: absolute;\n      top: 0; left: 0;\n      width: 100%;\n      height: 100%;\n    }\n    #bgCanvas {\n      z-index: 0;\n    }\n\n    /* \u2500\u2500 SCREENS \u2500\u2500 */\n    .screen {\n      position: absolute;\n      inset: 0;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n    }\n    .screen.hidden { display: none !important; }\n\n    /* \u2500\u2500 HOME SCREEN \u2500\u2500 */\n    #homeScreen {\n      background: linear-gradient(180deg, #1a0533 0%, #2d1b69 50%, #0f3460 100%);\n      z-index: 10;\n      pointer-events: auto;\n    }\n\n    .logo-area { text-align: center; margin-bottom: 40px; }\n    .logo-icon {\n      font-size: 72px;\n      animation: float 3s ease-in-out infinite;\n      display: block;\n      filter: drop-shadow(0 0 20px #a855f7);\n    }\n    .game-title {\n      font-size: 36px;\n      font-weight: 900;\n      background: linear-gradient(135deg, #a855f7, #06b6d4, #f59e0b);\n      -webkit-background-clip: text;\n      -webkit-text-fill-color: transparent;\n      background-clip: text;\n      letter-spacing: 2px;\n      margin-top: 10px;\n    }\n    .game-subtitle {\n      font-size: 13px;\n      color: #94a3b8;\n      letter-spacing: 4px;\n      text-transform: uppercase;\n      margin-top: 6px;\n    }\n\n    .stars-display {\n      background: rgba(255,255,255,0.08);\n      border: 1px solid rgba(255,255,255,0.15);\n      border-radius: 50px;\n      padding: 10px 24px;\n      display: flex;\n      align-items: center;\n      gap: 8px;\n      color: #fbbf24;\n      font-size: 18px;\n      font-weight: 700;\n      margin-bottom: 40px;\n    }\n\n    .btn {\n      cursor: pointer;\n      border: none;\n      border-radius: 50px;\n      font-weight: 700;\n      letter-spacing: 1px;\n      transition: all 0.18s ease;\n      -webkit-tap-highlight-color: transparent;\n    }\n    .btn:active { transform: scale(0.94); }\n\n    .btn-play {\n      background: linear-gradient(135deg, #7c3aed, #a855f7);\n      color: white;\n      font-size: 20px;\n      padding: 18px 64px;\n      box-shadow: 0 8px 32px #7c3aed66;\n      margin-bottom: 16px;\n    }\n    .btn-levels {\n      background: rgba(255,255,255,0.08);\n      border: 1.5px solid rgba(255,255,255,0.2) !important;\n      color: white;\n      font-size: 16px;\n      padding: 14px 48px;\n    }\n    .btn-howto {\n      background: transparent;\n      color: #94a3b8;\n      font-size: 14px;\n      padding: 10px 24px;\n      margin-top: 8px;\n    }\n\n    /* \u2500\u2500 LEVEL SELECT \u2500\u2500 */\n    #levelScreen {\n      background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);\n      z-index: 9;\n      padding: 40px 20px 20px;\n      justify-content: flex-start;\n      overflow-y: auto;\n    }\n    .screen-header {\n      width: 100%;\n      display: flex;\n      align-items: center;\n      gap: 12px;\n      margin-bottom: 28px;\n    }\n    .btn-back {\n      background: rgba(255,255,255,0.1);\n      color: white;\n      font-size: 20px;\n      width: 44px; height: 44px;\n      border-radius: 50%;\n      display: flex; align-items: center; justify-content: center;\n    }\n    .screen-title {\n      font-size: 22px;\n      font-weight: 800;\n      color: white;\n    }\n    .level-grid {\n      display: grid;\n      grid-template-columns: repeat(4, 1fr);\n      gap: 12px;\n      width: 100%;\n    }\n    .level-card {\n      aspect-ratio: 1;\n      border-radius: 16px;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n      cursor: pointer;\n      transition: transform 0.15s;\n      position: relative;\n      overflow: hidden;\n    }\n    .level-card:active { transform: scale(0.9); }\n    .level-card.unlocked {\n      background: linear-gradient(135deg, #312e81, #4c1d95);\n      border: 1.5px solid #7c3aed55;\n    }\n    .level-card.completed {\n      background: linear-gradient(135deg, #065f46, #047857);\n      border: 1.5px solid #10b98155;\n    }\n    .level-card.locked {\n      background: rgba(255,255,255,0.05);\n      border: 1.5px solid rgba(255,255,255,0.08);\n      cursor: default;\n    }\n    .level-num {\n      font-size: 22px;\n      font-weight: 800;\n      color: white;\n    }\n    .level-stars { font-size: 12px; letter-spacing: 1px; }\n    .lock-icon { font-size: 22px; opacity: 0.4; }\n\n    /* \u2500\u2500 GAME SCREEN \u2500\u2500 */\n    #gameScreen {\n      background: transparent;\n      z-index: 8;\n    }\n\n    /* HUD */\n    #hud {\n      position: absolute;\n      top: 0; left: 0; right: 0;\n      height: 80px;\n      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      padding: 0 20px;\n      z-index: 20;\n    }\n    .hud-pill {\n      background: rgba(0,0,0,0.5);\n      border: 1px solid rgba(255,255,255,0.15);\n      border-radius: 50px;\n      padding: 8px 16px;\n      display: flex; align-items: center; gap: 6px;\n      color: white; font-weight: 700; font-size: 15px;\n    }\n    .hud-lives { gap: 4px; }\n    .hud-heart { font-size: 16px; }\n    .hud-heart.dead { filter: grayscale(1); opacity: 0.3; }\n\n    /* PROGRESS BAR */\n    #progressBar {\n      position: absolute;\n      top: 80px; left: 20px; right: 20px;\n      height: 6px;\n      background: rgba(255,255,255,0.1);\n      border-radius: 10px;\n      z-index: 20;\n      overflow: hidden;\n    }\n    #progressFill {\n      height: 100%;\n      background: linear-gradient(90deg, #7c3aed, #a855f7, #06b6d4);\n      border-radius: 10px;\n      transition: width 0.3s ease;\n      width: 0%;\n    }\n\n    /* GAME CANVAS AREA */\n    #gameCanvas {\n      position: absolute;\n      top: 100px;\n      left: 0; right: 0;\n      bottom: 120px;\n      overflow: hidden;\n    }\n    #mainCanvas { border-radius: 0; }\n\n    /* BOTTOM CONTROLS */\n    #controls {\n      position: absolute;\n      bottom: 0; left: 0; right: 0;\n      height: 120px;\n      background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      padding: 0 24px 20px;\n      z-index: 20;\n    }\n    .d-pad {\n      display: flex;\n      gap: 12px;\n    }\n    .ctrl-btn {\n      width: 58px; height: 58px;\n      border-radius: 50%;\n      background: rgba(255,255,255,0.12);\n      border: 2px solid rgba(255,255,255,0.2);\n      color: white;\n      font-size: 22px;\n      display: flex; align-items: center; justify-content: center;\n      cursor: pointer;\n      -webkit-tap-highlight-color: transparent;\n      user-select: none;\n      transition: background 0.1s;\n    }\n    .ctrl-btn:active, .ctrl-btn.pressed {\n      background: rgba(124,58,237,0.5);\n      border-color: #a855f7;\n    }\n    .btn-jump {\n      width: 70px; height: 70px;\n      background: linear-gradient(135deg, #7c3aed, #a855f7);\n      border: none;\n      box-shadow: 0 6px 24px #7c3aed55;\n      font-size: 26px;\n    }\n\n    /* \u2500\u2500 PAUSE / OVERLAY \u2500\u2500 */\n    .overlay {\n      position: absolute;\n      inset: 0;\n      background: rgba(0,0,0,0.75);\n      backdrop-filter: blur(6px);\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n      z-index: 50;\n      gap: 16px;\n    }\n    .overlay.hidden { display: none; }\n    .overlay-title {\n      font-size: 42px;\n      font-weight: 900;\n      color: white;\n      text-align: center;\n    }\n    .overlay-sub { color: #94a3b8; font-size: 16px; text-align: center; }\n    .overlay-score {\n      font-size: 28px;\n      font-weight: 800;\n      color: #fbbf24;\n    }\n    .overlay-stars { font-size: 36px; letter-spacing: 4px; }\n    .btn-overlay {\n      background: linear-gradient(135deg, #7c3aed, #a855f7);\n      color: white;\n      font-size: 17px;\n      padding: 15px 48px;\n      box-shadow: 0 6px 24px #7c3aed44;\n      width: 220px;\n      text-align: center;\n    }\n    .btn-overlay-ghost {\n      background: rgba(255,255,255,0.08);\n      border: 1.5px solid rgba(255,255,255,0.15);\n      color: white;\n      font-size: 15px;\n      padding: 12px 40px;\n      width: 220px;\n      text-align: center;\n    }\n\n    /* \u2500\u2500 HOW TO PLAY \u2500\u2500 */\n    #howtoScreen {\n      background: linear-gradient(180deg, #0f172a, #1e1b4b);\n      z-index: 11;\n      padding: 40px 28px;\n      justify-content: flex-start;\n      overflow-y: auto;\n    }\n    .howto-step {\n      display: flex;\n      align-items: flex-start;\n      gap: 16px;\n      margin-bottom: 28px;\n      background: rgba(255,255,255,0.05);\n      border-radius: 16px;\n      padding: 16px;\n    }\n    .howto-icon { font-size: 36px; min-width: 44px; }\n    .howto-text h3 { color: white; font-size: 17px; font-weight: 700; margin-bottom: 4px; }\n    .howto-text p { color: #94a3b8; font-size: 14px; line-height: 1.5; }\n\n    @keyframes float {\n      0%, 100% { transform: translateY(0); }\n      50% { transform: translateY(-12px); }\n    }\n    @keyframes pulse-glow {\n      0%, 100% { box-shadow: 0 8px 32px #7c3aed66; }\n      50% { box-shadow: 0 8px 48px #a855f7aa; }\n    }\n    .btn-play { animation: pulse-glow 2s ease-in-out infinite; }\n\n    @keyframes coinSpin {\n      from { transform: rotateY(0deg); }\n      to { transform: rotateY(360deg); }\n    }\n    .spinning { animation: coinSpin 0.4s linear; }\n  </style>\n</head>\n<body>\n\n<div id=\"gameContainer\">\n\n  <!-- BG CANVAS (stars/particles) -->\n  <canvas id=\"bgCanvas\"></canvas>\n\n  <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 HOME SCREEN \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n  <div class=\"screen\" id=\"homeScreen\">\n    <div class=\"logo-area\">\n      <span class=\"logo-icon\">\ud83c\udfae</span>\n      <div class=\"game-title\">TWEENCRAFT</div>\n      <div class=\"game-subtitle\">Adventure</div>\n    </div>\n    <div class=\"stars-display\">\u2b50 <span id=\"totalStars\">0</span> Stars Collected</div>\n    <button class=\"btn btn-play\" onclick=\"showScreen('levelScreen')\">\u25b6 PLAY</button>\n    <button class=\"btn btn-levels\" onclick=\"showScreen('levelScreen')\">\ud83d\udccb Level Select</button>\n    <button class=\"btn btn-howto\" onclick=\"showScreen('howtoScreen')\">\u2753 How to Play</button>\n  </div>\n\n  <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 LEVEL SELECT \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n  <div class=\"screen hidden\" id=\"levelScreen\">\n    <div class=\"screen-header\">\n      <button class=\"btn btn-back\" onclick=\"showScreen('homeScreen')\">\u2190</button>\n      <div class=\"screen-title\">Choose Level</div>\n    </div>\n    <div class=\"level-grid\" id=\"levelGrid\"></div>\n  </div>\n\n  <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 HOW TO PLAY \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n  <div class=\"screen hidden\" id=\"howtoScreen\">\n    <div class=\"screen-header\">\n      <button class=\"btn btn-back\" onclick=\"showScreen('homeScreen')\">\u2190</button>\n      <div class=\"screen-title\">How to Play</div>\n    </div>\n    <div class=\"howto-step\">\n      <div class=\"howto-icon\">\ud83d\udc48\ud83d\udc49</div>\n      <div class=\"howto-text\">\n        <h3>Move Your Character</h3>\n        <p>Use the Left / Right arrow buttons to walk. On desktop, use keyboard arrow keys.</p>\n      </div>\n    </div>\n    <div class=\"howto-step\">\n      <div class=\"howto-icon\">\u2b06\ufe0f</div>\n      <div class=\"howto-text\">\n        <h3>Jump</h3>\n        <p>Tap the purple JUMP button (or press Space / Up arrow) to leap over enemies and gaps.</p>\n      </div>\n    </div>\n    <div class=\"howto-step\">\n      <div class=\"howto-icon\">\ud83e\ude99</div>\n      <div class=\"howto-text\">\n        <h3>Collect Coins</h3>\n        <p>Grab all yellow coins to earn stars. More coins = more stars at end of level!</p>\n      </div>\n    </div>\n    <div class=\"howto-step\">\n      <div class=\"howto-icon\">\ud83d\udea9</div>\n      <div class=\"howto-text\">\n        <h3>Reach the Flag</h3>\n        <p>Touch the green flag at the end of each level to win. Avoid enemies and pits!</p>\n      </div>\n    </div>\n    <div class=\"howto-step\">\n      <div class=\"howto-icon\">\ud83d\udc9c</div>\n      <div class=\"howto-text\">\n        <h3>Lives</h3>\n        <p>You start with 3 hearts. Touching an enemy or falling costs one life. Lose all 3 and it's game over!</p>\n      </div>\n    </div>\n  </div>\n\n  <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 GAME SCREEN \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n  <div class=\"screen hidden\" id=\"gameScreen\">\n    <!-- HUD -->\n    <div id=\"hud\">\n      <div style=\"display:flex;gap:8px;\"><button class=\"btn\" style=\"background:rgba(255,255,255,0.1);color:white;padding:8px 14px;font-size:14px;border-radius:50px;\" onclick=\"togglePause()\">\u23f8</button><button class=\"btn\" id=\"muteBtn\" style=\"background:rgba(255,255,255,0.1);color:white;padding:8px 14px;font-size:14px;border-radius:50px;\" onclick=\"toggleMuteBtn()\">\ud83d\udd0a</button></div>\n      <div class=\"hud-pill\" id=\"levelName\">Lv 1</div><div class=\"hud-pill\">\ud83e\ude99 <span id=\"coinCount\">0</span></div>\n      <div class=\"hud-pill hud-lives\" id=\"livesDisplay\"></div>\n    </div>\n    <div id=\"progressBar\"><div id=\"progressFill\"></div></div>\n\n    <!-- MAIN GAME CANVAS -->\n    <div id=\"gameCanvas\">\n      <canvas id=\"mainCanvas\"></canvas>\n    </div>\n\n    <!-- CONTROLS -->\n    <div id=\"controls\">\n      <div class=\"d-pad\">\n        <div class=\"ctrl-btn\" id=\"btnLeft\"  ontouchstart=\"keyState.left=true\" ontouchend=\"keyState.left=false\">\u25c0</div>\n        <div class=\"ctrl-btn\" id=\"btnRight\" ontouchstart=\"keyState.right=true\" ontouchend=\"keyState.right=false\">\u25b6</div>\n      </div>\n      <div class=\"ctrl-btn btn-jump\" id=\"btnJump\" ontouchstart=\"doJump()\" ontouchend=\"\">\u2b06</div>\n    </div>\n\n    <!-- PAUSE OVERLAY -->\n    <div class=\"overlay hidden\" id=\"pauseOverlay\">\n      <div class=\"overlay-title\">\u23f8 Paused</div>\n      <button class=\"btn btn-overlay\" onclick=\"togglePause()\">\u25b6 Resume</button>\n      <button class=\"btn btn-overlay-ghost\" onclick=\"restartLevel()\">\ud83d\udd04 Restart</button>\n      <button class=\"btn btn-overlay-ghost\" onclick=\"quitToMenu()\">\ud83c\udfe0 Menu</button>\n    </div>\n\n    <!-- WIN OVERLAY -->\n    <div class=\"overlay hidden\" id=\"winOverlay\">\n      <div class=\"overlay-title\">\ud83c\udf89 Level Clear!</div>\n      <div class=\"overlay-stars\" id=\"winStars\">\u2b50\u2b50\u2b50</div>\n      <div class=\"overlay-score\">\ud83e\ude99 <span id=\"winCoins\">0</span> coins</div>\n      <button class=\"btn btn-overlay\" onclick=\"nextLevel()\">\u25b6 Next Level</button>\n      <button class=\"btn btn-overlay-ghost\" onclick=\"restartLevel()\">\ud83d\udd04 Replay</button>\n      <button class=\"btn btn-overlay-ghost\" onclick=\"quitToMenu()\">\ud83c\udfe0 Menu</button>\n    </div>\n\n    <!-- DEAD OVERLAY -->\n    <div class=\"overlay hidden\" id=\"deadOverlay\">\n      <div class=\"overlay-title\">\ud83d\udc80 Game Over</div>\n      <div class=\"overlay-sub\">Better luck next time!</div>\n      <button class=\"btn btn-overlay\" onclick=\"restartLevel()\">\ud83d\udd04 Try Again</button>\n      <button class=\"btn btn-overlay-ghost\" onclick=\"quitToMenu()\">\ud83c\udfe0 Menu</button>\n    </div>\n  </div>\n\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     JAVASCRIPT GAME ENGINE\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<script>\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 GLOBALS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst W = 390, H = 844;\nlet currentLevel = 0;\nlet totalStarsEarned = +localStorage.getItem('tc_stars') || 0;\nlet levelProgress = JSON.parse(localStorage.getItem('tc_progress') || '{}');\n\nconst GRAVITY = 0.55, JUMP_FORCE = -13, MOVE_SPEED = 4.5;\nlet animFrame, lastTime = 0, paused = false, gameOver = false, won = false;\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 LEVEL DATA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n// Each level: { bg, platforms: [{x,y,w,h,color}], coins:[{x,y}], enemies:[{x,y,dir}], flagX, coinTotal }\nfunction makeLevels() {\n  return [\n    { // Level 1 - Tutorial\n      bgTop:'#1a0533', bgBot:'#2d1b69',\n      platforms:[\n        {x:0,   y:320, w:300, h:20, c:'#4c1d95'},\n        {x:320, y:280, w:120, h:20, c:'#4c1d95'},\n        {x:480, y:240, w:100, h:20, c:'#4c1d95'},\n        {x:620, y:280, w:140, h:20, c:'#4c1d95'},\n        {x:800, y:320, w:400, h:20, c:'#4c1d95'},\n      ],\n      coins:[{x:80,y:285},{x:140,y:285},{x:200,y:285},\n             {x:350,y:245},{x:510,y:205},{x:660,y:245},\n             {x:850,y:285},{x:920,y:285},{x:1000,y:285}],\n      enemies:[{x:860,y:298,dir:1,speed:1.5}],\n      flagX:1150,\n      width:1300,\n    },\n    { // Level 2 - Platforms\n      bgTop:'#0f172a', bgBot:'#1e3a5f',\n      platforms:[\n        {x:0,   y:320, w:150, h:20, c:'#1e40af'},\n        {x:200, y:270, w:100, h:20, c:'#1d4ed8'},\n        {x:360, y:220, w:100, h:20, c:'#2563eb'},\n        {x:520, y:270, w:100, h:20, c:'#1d4ed8'},\n        {x:680, y:240, w:80,  h:20, c:'#1e40af'},\n        {x:820, y:290, w:180, h:20, c:'#1e40af'},\n        {x:1050,y:240, w:200, h:20, c:'#1e40af'},\n      ],\n      coins:[{x:60,y:285},{x:100,y:285},\n             {x:230,y:235},{x:280,y:235},\n             {x:390,y:185},{x:430,y:185},\n             {x:550,y:235},{x:600,y:235},\n             {x:710,y:205},{x:900,y:255},\n             {x:1080,y:205},{x:1150,y:205},{x:1220,y:205}] = document.getElementById('bgCanvas');\nconst bgCtx = bgCanvas.getContext('2d');\nbgCanvas.width = W; bgCanvas.height = H;\nconst stars = Array.from({length:120}, ()=>({\n  x: Math.random()*W, y: Math.random()*H,\n  r: Math.random()*1.5+0.3,\n  a: Math.random(), da: (Math.random()-0.5)*0.02\n}));\nfunction drawBg() {\n  bgCtx.clearRect(0,0,W,H);\n  stars.forEach(s => {\n    s.a = Math.max(0.1, Math.min(1, s.a + s.da));\n    if(s.a<=0.1||s.a>=1) s.da *= -1;\n    bgCtx.beginPath();\n    bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);\n    bgCtx.fillStyle = `rgba(255,255,255,${s.a})`;\n    bgCtx.fill();\n  });\n  requestAnimationFrame(drawBg);\n}\ndrawBg();\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 LEVEL GRID \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction buildLevelGrid() {\n  const levels = makeLevels();\n  const themeEmoji = ['\ud83c\udfae','\ud83c\udfd4\ufe0f','\ud83d\udd25','\u2744\ufe0f','\ud83c\udf0b','\ud83c\udf0a','\ud83c\udfdc\ufe0f','\ud83c\udf0c','\ud83d\udc7e'];\n  const grid = document.getElementById('levelGrid');\n  grid.innerHTML = '';\n  let unlocked = +localStorage.getItem('tc_unlocked') || 0;\n  for(let i=0;i<levels.length;i++){\n    const card = document.createElement('div');\n    const prog = levelProgress[i];\n    const strs = prog ? prog.stars : 0;\n    if(i===0||i<=unlocked){\n      card.className = 'level-card ' + (prog ? 'completed' : 'unlocked');\n      card.innerHTML = `<div style=\"font-size:20px\">${themeEmoji[i]||'\ud83c\udfae'}</div><div class=\"level-num\" style=\"font-size:16px\">${i+1}</div><div class=\"level-stars\">${'\u2b50'.repeat(strs)}${'\u2729'.repeat(3-strs)}</div>`;\n      card.onclick = () => startLevel(i);\n    } else {\n      card.className = 'level-card locked';\n      card.innerHTML = `<div style=\"font-size:18px;opacity:0.4\">${themeEmoji[i]||'\ud83c\udfae'}</div><div class=\"lock-icon\">\ud83d\udd12</div>`;\n    }\n    grid.appendChild(card);\n  }\n  document.getElementById('totalStars').textContent = totalStarsEarned;\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 SCREEN MANAGER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction showScreen(id) {\n  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));\n  document.getElementById(id).classList.remove('hidden');\n  if(id==='levelScreen') buildLevelGrid();\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 GAME STATE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nlet state = {};\nconst keyState = {left:false, right:false, jump:false};\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 START LEVEL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction startLevel(idx) {\n  currentLevel = idx;\n  const levels = makeLevels();\n  const lvl = levels[idx];\n  paused = false; gameOver = false; won = false;\n\n  const canvas = document.getElementById('mainCanvas');\n  const gameDiv = document.getElementById('gameCanvas');\n  const gW = gameDiv.clientWidth || W;\n  const gH = gameDiv.clientHeight || (H - 220);\n  canvas.width = gW;\n  canvas.height = gH;\n\n  // Camera\n  const cam = {x:0, y:0, w:gW, h:gH};\n\n  // Player\n  const player = {\n    x:50, y:lvl.platforms[0].y - 40,\n    vx:0, vy:0,\n    w:28, h:38,\n    onGround:false,\n    lives:3,\n    invincible:0,\n    frameT:0, frame:0,\n    facing:1,\n    dead:false, deadTimer:0,\n  };\n\n  // Coins deep copy\n  const coins = lvl.coins.map(c=>({...c, collected:false, bounce:0}));\n\n  // Enemies deep copy\n  const enemies = lvl.enemies.map(e=>({...e}));\n\n  state = { lvl, player, cam, coins, enemies, canvas, ctx: canvas.getContext('2d'),\n            gW, gH, coins_collected:0, total_coins: coins.length };\n\n  // Show overlays hidden\n  const lvlNames=['\ud83c\udfae Tutorial','\ud83c\udf11 Platforms','\ud83d\udd25 Enemy Rush','\u2744\ufe0f Ice World','\ud83c\udf0b Fire World','\ud83c\udf0a Ocean World','\ud83c\udfdc\ufe0f Desert World','\ud83c\udf0c Space World','\ud83d\udc7e Boss Level'];\n  const nameEl=document.getElementById('levelName'); if(nameEl) nameEl.textContent=lvlNames[idx]||('Lv '+(idx+1));\n  ['pauseOverlay','winOverlay','deadOverlay'].forEach(id=>document.getElementById(id).classList.add('hidden'));\n  updateLivesHUD();\n  showScreen('gameScreen');\n\n  if(animFrame) cancelAnimationFrame(animFrame);\n  lastTime = performance.now();\n  Audio.stopBGM();\n  Audio.getCtx();\n  setTimeout(() => { Audio.SFX.levelstart(); setTimeout(() => Audio.startBGM(), 600); }, 100);\n  animFrame = requestAnimationFrame(gameLoop);\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 GAME LOOP \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction gameLoop(ts) {\n  const dt = Math.min((ts - lastTime)/16.67, 3);\n  lastTime = ts;\n  if(!paused && !gameOver && !won) update(dt);\n  draw();\n  animFrame = requestAnimationFrame(gameLoop);\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 UPDATE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction update(dt) {\n  const {lvl, player, cam, coins, enemies} = state;\n\n  // \u2500\u2500 Player movement \u2500\u2500\n  if(keyState.left)  { player.vx = -MOVE_SPEED; player.facing = -1; }\n  else if(keyState.right) { player.vx = MOVE_SPEED; player.facing = 1; }\n  else player.vx *= (state.lvl && state.lvl.theme==='ice' ? 0.97 : 0.75);\n\n  if(keyState.jump && player.onGround) {\n    player.vy = lvlJump;\n    player.onGround = false;\n    keyState.jump = false;\n  }\n\n  const lvlGravity = state.lvl.gravity || GRAVITY;\n  const lvlJump = state.lvl.jumpForce || JUMP_FORCE;\n  player.vy += lvlGravity * dt;\n  player.x += player.vx * dt;\n  player.y += player.vy * dt;\n  player.onGround = false;\n\n  // Floor\n  const floorY = state.gH - 10;\n  if(player.y + player.h >= floorY) {\n    player.y = floorY - player.h;\n    player.vy = 0;\n    player.onGround = true;\n    // died from falling into pit? (if floor is much lower than platforms)\n    if(floorY > state.gH - 15 && player.y + player.h >= state.gH - 15) {\n      // check if below visible area = pit death\n    }\n  }\n\n  // \u2500\u2500 Platform collisions \u2500\u2500\n  lvl.platforms.forEach(p => {\n    if(rectOverlap(player, p)) {\n      const overlapY = (player.y + player.h) - p.y;\n      const overlapYBot = (p.y + p.h) - player.y;\n      const overlapX = player.vx > 0 ? (player.x + player.w) - p.x : (p.x + p.w) - player.x;\n      if(overlapY < overlapYBot && overlapY < overlapX && player.vy >= 0) {\n        player.y = p.y - player.h;\n        player.vy = 0;\n        player.onGround = true;\n      } else if(overlapYBot < overlapY && overlapYBot < overlapX && player.vy < 0) {\n        player.y = p.y + p.h;\n        player.vy = Math.abs(player.vy) * 0.3;\n      } else {\n        player.x -= player.vx * dt;\n        player.vx = 0;\n      }\n    }\n  });\n\n  // Clamp x\n  player.x = Math.max(0, Math.min(player.x, lvl.width - player.w));\n\n  // \u2500\u2500 Camera follow \u2500\u2500\n  cam.x = Math.max(0, Math.min(player.x - state.gW/3, lvl.width - state.gW));\n\n  // \u2500\u2500 Coin collection \u2500\u2500\n  coins.forEach(c => {\n    if(!c.collected && rectOverlap(player, {x:c.x-10,y:c.y-10,w:20,h:20})) {\n      c.collected = true;\n      c.bounce = 1;\n      state.coins_collected++;\n      Audio.SFX.coin();\n      updateCoinHUD();\n    }\n  });\n\n  // \u2500\u2500 Enemy update \u2500\u2500\n  if(player.invincible > 0) player.invincible -= dt;\n\n  enemies.forEach(en => {\n    en.x += en.dir * en.speed * dt;\n    // Bounce on platform edges\n    const onPlat = lvl.platforms.find(p =>\n      en.x >= p.x && en.x + 28 <= p.x + p.w &&\n      Math.abs((en.y + 20) - p.y) < 4\n    );\n    if(!onPlat) en.dir *= -1;\n\n    // Hurt player\n    if(player.invincible <= 0 && rectOverlap(player, {x:en.x,y:en.y,w:28,h:28})) {\n      player.lives--;\n      player.invincible = 90;\n      Audio.SFX.hurt();\n      updateLivesHUD();\n      if(player.lives <= 0) triggerDead();\n    }\n  });\n\n  // \u2500\u2500 Pit death \u2500\u2500\n  if(player.y > state.gH + 60) {\n    player.lives--;\n    player.invincible = 90;\n    Audio.SFX.hurt();\n    updateLivesHUD();\n    player.y = lvl.platforms[0].y - 40;\n    player.x = Math.max(0, cam.x);\n    player.vy = 0;\n    if(player.lives <= 0) triggerDead();\n  }\n\n  // \u2500\u2500 Flag check \u2500\u2500\n  if(player.x + player.w > lvl.flagX) triggerWin();\n\n  // \u2500\u2500 Progress bar \u2500\u2500\n  const pct = Math.min(100, ((player.x) / (lvl.flagX)) * 100);\n  document.getElementById('progressFill').style.width = pct + '%';\n\n  // \u2500\u2500 Animation \u2500\u2500\n  player.frameT++;\n  if(player.frameT % 8 === 0) player.frame = (player.frame + 1) % 4;\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 DRAW \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction draw() {\n  const {lvl, player, cam, coins, enemies, ctx, gW, gH} = state;\n\n  // BG gradient\n  const grad = ctx.createLinearGradient(0,0,0,gH);\n  grad.addColorStop(0, lvl.bgTop);\n  grad.addColorStop(1, lvl.bgBot);\n  ctx.fillStyle = grad;\n  ctx.fillRect(0,0,gW,gH);\n\n  ctx.save();\n  ctx.translate(-cam.x, 0);\n\n  // \u2500\u2500 Theme BG FX \u2500\u2500\n  const theme = lvl.theme || 'default';\n  if(theme==='ice'){\n    // Snowflakes\n    ctx.globalAlpha=0.4; ctx.fillStyle='#e0f2fe';\n    for(let si=0;si<12;si++){\n      const sx=((si*137+cam.x*0.1)%(gW+40))-20;\n      const sy=(Date.now()/1000*0.6+si*60)%gH;\n      ctx.beginPath(); ctx.arc(sx,sy,2,0,Math.PI*2); ctx.fill();\n    }\n    ctx.globalAlpha=1;\n  } else if(theme==='fire'){\n    // Fire glow at bottom\n    const fg=ctx.createLinearGradient(0,gH-40,0,gH);\n    fg.addColorStop(0,'rgba(0,0,0,0)');\n    fg.addColorStop(1,`rgba(239,68,68,${0.3+Math.sin(Date.now()/200)*0.1})`);\n    ctx.fillStyle=fg; ctx.fillRect(0,gH-80,gW,80);\n  } else if(theme==='ocean'){\n    // Bubbles\n    ctx.globalAlpha=0.3; ctx.strokeStyle='#7dd3fa'; ctx.lineWidth=1.5;\n    for(let bi=0;bi<8;bi++){\n      const bx=((bi*173+cam.x*0.05)%(gW+20))-10;\n      const by=(gH-(Date.now()/800+bi*80)%gH);\n      ctx.beginPath(); ctx.arc(bx,by,3+bi%3,0,Math.PI*2); ctx.stroke();\n    }\n    ctx.globalAlpha=1;\n  } else if(theme==='space'){\n    // Extra twinkling stars\n    ctx.globalAlpha=0.6;\n    for(let si=0;si<20;si++){\n      const sx=((si*97+cam.x*0.05)%(gW+20));\n      const sy=(si*61)%gH;\n      const alpha=0.4+Math.sin(Date.now()/400+si)*0.4;\n      ctx.globalAlpha=alpha;\n      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(sx,sy,1,0,Math.PI*2); ctx.fill();\n    }\n    ctx.globalAlpha=1;\n  } else if(theme==='boss'){\n    // Lightning flickers\n    if(Math.random()<0.05){\n      ctx.strokeStyle='rgba(168,85,247,0.6)'; ctx.lineWidth=1;\n      ctx.beginPath(); ctx.moveTo(Math.random()*gW,0);\n      for(let li=0;li<5;li++) ctx.lineTo(Math.random()*gW,li*gH/5);\n      ctx.stroke();\n    }\n  } else {\n    // Default clouds\n    ctx.globalAlpha = 0.12; ctx.fillStyle = '#fff';\n    [100,320,600,900,1100].forEach((cx,i)=>{\n      const px = ((cx - cam.x*0.3) % (lvl.width+200)) + cam.x*0.3 - 100;\n      ctx.beginPath(); ctx.ellipse(px, 60+i*18, 60+i*10, 22, 0, 0, Math.PI*2); ctx.fill();\n    });\n    ctx.globalAlpha = 1;\n  }\n\n  // \u2500\u2500 Platforms \u2500\u2500\n  lvl.platforms.forEach(p => {\n    ctx.fillStyle = p.c;\n    roundRect(ctx, p.x, p.y, p.w, p.h, 8);\n    ctx.fillStyle = 'rgba(255,255,255,0.15)';\n    roundRect(ctx, p.x+4, p.y+2, p.w-8, 5, 3);\n    const theme = lvl.theme || 'default';\n    if(theme==='ice'){\n      // Ice shine\n      ctx.fillStyle = 'rgba(186,230,253,0.4)';\n      ctx.fillRect(p.x+6, p.y+3, p.w-12, 4);\n      // Icicles\n      ctx.fillStyle = '#bae6fd';\n      for(let ix=p.x+10; ix<p.x+p.w-10; ix+=18){\n        ctx.beginPath(); ctx.moveTo(ix,p.y+p.h); ctx.lineTo(ix+5,p.y+p.h); ctx.lineTo(ix+2.5,p.y+p.h+10); ctx.fill();\n      }\n    } else if(theme==='fire'){\n      // Lava glow top\n      const now = Date.now()/300;\n      ctx.fillStyle = `rgba(251,146,60,${0.3+Math.sin(now+p.x)*0.2})`;\n      ctx.fillRect(p.x+4, p.y-4, p.w-8, 6);\n      // Embers\n      for(let ex=p.x+8; ex<p.x+p.w-8; ex+=20){\n        const ey = Math.sin(Date.now()/200+ex)*3;\n        ctx.fillStyle='#fbbf24'; ctx.beginPath(); ctx.arc(ex, p.y-6+ey,2,0,Math.PI*2); ctx.fill();\n      }\n    } else if(theme==='ocean'){\n      // Seaweed\n      ctx.fillStyle='#15803d';\n      for(let sx=p.x+8; sx<p.x+p.w-8; sx+=24){\n        const sw=Math.sin(Date.now()/400+sx)*4;\n        ctx.beginPath(); ctx.moveTo(sx,p.y); ctx.quadraticCurveTo(sx+sw,p.y-8,sx+sw*0.5,p.y-14); ctx.lineWidth=3; ctx.strokeStyle='#16a34a'; ctx.stroke();\n      }\n    } else if(theme==='desert'){\n      // Sand ripples\n      ctx.strokeStyle='rgba(251,191,36,0.3)'; ctx.lineWidth=1;\n      for(let dr=2;dr<p.h-2;dr+=4){\n        ctx.beginPath(); ctx.moveTo(p.x+4,p.y+dr); ctx.lineTo(p.x+p.w-4,p.y+dr); ctx.stroke();\n      }\n    } else if(theme==='space'){\n      // Neon glow edge\n      ctx.shadowColor=p.c; ctx.shadowBlur=10;\n      ctx.strokeStyle=p.c; ctx.lineWidth=2;\n      ctx.strokeRect(p.x+2, p.y+2, p.w-4, p.h-4);\n      ctx.shadowBlur=0;\n    } else if(theme==='boss'){\n      // Electric border\n      const t=Date.now()/150;\n      ctx.strokeStyle=`rgba(168,85,247,${0.5+Math.sin(t)*0.5})`; ctx.lineWidth=2;\n      ctx.shadowColor='#a855f7'; ctx.shadowBlur=8;\n      ctx.strokeRect(p.x,p.y,p.w,p.h); ctx.shadowBlur=0;\n    } else {\n      // Default grass\n      ctx.fillStyle = '#6ee7b7';\n      for(let tx=p.x+8; tx<p.x+p.w-8; tx+=22){\n        ctx.beginPath(); ctx.arc(tx, p.y-3, 5, Math.PI, 0); ctx.fill();\n      }\n    }\n  });\n\n  // \u2500\u2500 Coins \u2500\u2500\n  coins.forEach(c => {\n    if(c.collected) return;\n    const bobY = Math.sin(Date.now()/400 + c.x) * 4;\n    // Glow\n    const cg = ctx.createRadialGradient(c.x, c.y+bobY, 2, c.x, c.y+bobY, 14);\n    cg.addColorStop(0,'rgba(251,191,36,0.6)');\n    cg.addColorStop(1,'rgba(251,191,36,0)');\n    ctx.fillStyle = cg;\n    ctx.beginPath();\n    ctx.arc(c.x, c.y+bobY, 14, 0, Math.PI*2);\n    ctx.fill();\n    // Coin body\n    ctx.fillStyle = '#fbbf24';\n    ctx.beginPath();\n    ctx.arc(c.x, c.y+bobY, 9, 0, Math.PI*2);\n    ctx.fill();\n    ctx.fillStyle = '#fde68a';\n    ctx.beginPath();\n    ctx.arc(c.x-2, c.y+bobY-2, 4, 0, Math.PI*2);\n    ctx.fill();\n    ctx.fillStyle = '#d97706';\n    ctx.font = 'bold 9px sans-serif';\n    ctx.textAlign = 'center';\n    ctx.fillText('\u00a2', c.x, c.y+bobY+4);\n  });\n\n  // \u2500\u2500 Enemies \u2500\u2500\n  enemies.forEach(en => {\n    // Body\n    ctx.fillStyle = '#ef4444';\n    roundRect(ctx, en.x, en.y, 28, 28, 6);\n    // Eyes\n    ctx.fillStyle = 'white';\n    ctx.beginPath(); ctx.arc(en.x+8, en.y+10, 5, 0, Math.PI*2); ctx.fill();\n    ctx.beginPath(); ctx.arc(en.x+20, en.y+10, 5, 0, Math.PI*2); ctx.fill();\n    ctx.fillStyle = '#1e1e1e';\n    ctx.beginPath(); ctx.arc(en.x+8+(en.dir*1), en.y+10, 2.5, 0, Math.PI*2); ctx.fill();\n    ctx.beginPath(); ctx.arc(en.x+20+(en.dir*1), en.y+10, 2.5, 0, Math.PI*2); ctx.fill();\n    // Mouth\n    ctx.strokeStyle = 'white'; ctx.lineWidth = 2;\n    ctx.beginPath();\n    ctx.arc(en.x+14, en.y+20, 4, 0.3, Math.PI-0.3);\n    ctx.stroke();\n    // Feet\n    const ft = Math.sin(Date.now()/120)*4;\n    ctx.fillStyle = '#b91c1c';\n    ctx.fillRect(en.x+4,  en.y+28, 8, 6+ft);\n    ctx.fillRect(en.x+16, en.y+28, 8, 6-ft);\n  });\n\n  // \u2500\u2500 Flag \u2500\u2500\n  const flagX = lvl.flagX;\n  ctx.fillStyle = '#374151';\n  ctx.fillRect(flagX, gH-200, 6, 140);\n  ctx.fillStyle = '#10b981';\n  ctx.fillRect(flagX+6, gH-200, 40, 28);\n  ctx.fillStyle = '#34d399';\n  ctx.fillRect(flagX+10, gH-196, 32, 20);\n  // Flag wave effect\n  ctx.fillStyle = '#6ee7b7';\n  ctx.beginPath();\n  const wave = Math.sin(Date.now()/300)*4;\n  ctx.fillRect(flagX+26, gH-196+wave, 8, 10);\n\n  // \u2500\u2500 Player \u2500\u2500\n  const px = player.x, py = player.y;\n  const flash = player.invincible > 0 && Math.floor(player.invincible/6)%2===0;\n  if(!flash) {\n    ctx.save();\n    if(player.facing === -1) {\n      ctx.translate(px + player.w, 0);\n      ctx.scale(-1, 1);\n    } else {\n      ctx.translate(px, 0);\n    }\n    // Body\n    ctx.fillStyle = '#7c3aed';\n    roundRect(ctx, 0, 8, player.w, player.h-8, 8);\n    // Head\n    ctx.fillStyle = '#f3d9c0';\n    ctx.beginPath();\n    ctx.arc(player.w/2, 8, 12, 0, Math.PI*2);\n    ctx.fill();\n    // Eyes\n    ctx.fillStyle = '#1e1e1e';\n    ctx.beginPath(); ctx.arc(player.w/2+4, 6, 2.5, 0, Math.PI*2); ctx.fill();\n    ctx.beginPath(); ctx.arc(player.w/2-4, 6, 2.5, 0, Math.PI*2); ctx.fill();\n    // Smile\n    ctx.strokeStyle = '#92400e'; ctx.lineWidth = 1.5;\n    ctx.beginPath(); ctx.arc(player.w/2, 10, 4, 0.2, Math.PI-0.2); ctx.stroke();\n    // Cape\n    ctx.fillStyle = '#a855f7';\n    ctx.beginPath();\n    ctx.moveTo(2, 12);\n    ctx.lineTo(-8, 28);\n    ctx.lineTo(2, 24);\n    ctx.closePath();\n    ctx.fill();\n    // Legs animation\n    const legSwing = player.onGround ? Math.sin(Date.now()/100) * (Math.abs(player.vx)>0.5?1:0) * 6 : 0;\n    ctx.fillStyle = '#4c1d95';\n    ctx.fillRect(3,  player.h-12, 8, 12 + legSwing);\n    ctx.fillRect(player.w-11, player.h-12, 8, 12 - legSwing);\n    // Shoes\n    ctx.fillStyle = '#1e1e1e';\n    ctx.fillRect(1,  player.h-2 + legSwing, 12, 6);\n    ctx.fillRect(player.w-13, player.h-2 - legSwing, 12, 6);\n    ctx.restore();\n  }\n\n  ctx.restore();\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 HELPERS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction rectOverlap(a, b) {\n  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;\n}\nfunction roundRect(ctx, x, y, w, h, r) {\n  ctx.beginPath();\n  ctx.moveTo(x+r, y);\n  ctx.lineTo(x+w-r, y);\n  ctx.quadraticCurveTo(x+w, y, x+w, y+r);\n  ctx.lineTo(x+w, y+h-r);\n  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);\n  ctx.lineTo(x+r, y+h);\n  ctx.quadraticCurveTo(x, y+h, x, y+h-r);\n  ctx.lineTo(x, y+r);\n  ctx.quadraticCurveTo(x, y, x+r, y);\n  ctx.closePath();\n  ctx.fill();\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 HUD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction updateCoinHUD() {\n  document.getElementById('coinCount').textContent = state.coins_collected;\n}\nfunction updateLivesHUD() {\n  const lives = state.player ? state.player.lives : 3;\n  let html = '';\n  for(let i=0;i<3;i++) html += `<span class=\"hud-heart${i<lives?'':' dead'}\">\ud83d\udc9c</span>`;\n  document.getElementById('livesDisplay').innerHTML = html;\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 EVENTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction triggerWin() {\n  won = true;\n  Audio.SFX.win();\n  Audio.stopBGM();\n  const coins = state.coins_collected;\n  const total = state.total_coins;\n  const ratio = coins / total;\n  const stars = ratio >= 0.9 ? 3 : ratio >= 0.5 ? 2 : 1;\n  const prev = levelProgress[currentLevel];\n  if(!prev || prev.stars < stars) {\n    levelProgress[currentLevel] = {stars};\n    totalStarsEarned = Object.values(levelProgress).reduce((a,b)=>a+(b.stars||0),0);\n    localStorage.setItem('tc_stars', totalStarsEarned);\n    localStorage.setItem('tc_progress', JSON.stringify(levelProgress));\n  }\n  const levels = makeLevels();\n  const unlocked = +localStorage.getItem('tc_unlocked') || 0;\n  if(currentLevel >= unlocked && currentLevel + 1 < levels.length)\n    localStorage.setItem('tc_unlocked', currentLevel+1);\n\n  document.getElementById('winStars').textContent = '\u2b50'.repeat(stars) + '\u2729'.repeat(3-stars);\n  document.getElementById('winCoins').textContent = coins;\n  document.getElementById('winOverlay').classList.remove('hidden');\n}\nfunction triggerDead() {\n  gameOver = true;\n  Audio.SFX.dead();\n  Audio.stopBGM();\n  document.getElementById('deadOverlay').classList.remove('hidden');\n}\nfunction togglePause() {\n  paused = !paused;\n  document.getElementById('pauseOverlay').classList.toggle('hidden', !paused);\n}\nfunction restartLevel() { startLevel(currentLevel); }\nfunction nextLevel() {\n  const levels = makeLevels();\n  if(currentLevel + 1 < levels.length) startLevel(currentLevel+1);\n  else quitToMenu();\n}\nfunction quitToMenu() {\n  Audio.stopBGM();\n  if(animFrame) cancelAnimationFrame(animFrame);\n  showScreen('homeScreen');\n  document.getElementById('totalStars').textContent = totalStarsEarned;\n}\nfunction toggleMuteBtn() {\n  const muted = Audio.toggleMute();\n  document.getElementById('muteBtn').textContent = muted ? '\ud83d\udd07' : '\ud83d\udd0a';\n}\n\nfunction doJump() {\n  Audio.SFX.jump();\n  keyState.jump = true;\n  setTimeout(()=>keyState.jump=false, 100);\n}\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 KEYBOARD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndocument.addEventListener('keydown', e => {\n  if(e.key==='ArrowLeft'||e.key==='a')  keyState.left=true;\n  if(e.key==='ArrowRight'||e.key==='d') keyState.right=true;\n  if((e.key==='ArrowUp'||e.key===' '||e.key==='w') && !e.repeat) doJump();\n  if(e.key==='Escape') togglePause();\n});\ndocument.addEventListener('keyup', e => {\n  if(e.key==='ArrowLeft'||e.key==='a')  keyState.left=false;\n  if(e.key==='ArrowRight'||e.key==='d') keyState.right=false;\n});\n\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 AUDIO ENGINE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst Audio = (() => {\n  let ctx = null;\n  let bgNodes = {};\n  let bgPlaying = false;\n  let muted = false;\n\n  function getCtx() {\n    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();\n    if (ctx.state === 'suspended') ctx.resume();\n    return ctx;\n  }\n\n  // \u2500\u2500 Generic sound player \u2500\u2500\n  function playTone(freq, type, duration, vol, detune=0, delay=0) {\n    if (muted) return;\n    try {\n      const c = getCtx();\n      const osc = c.createOscillator();\n      const gain = c.createGain();\n      osc.connect(gain);\n      gain.connect(c.destination);\n      osc.type = type;\n      osc.frequency.setValueAtTime(freq, c.currentTime + delay);\n      osc.detune.setValueAtTime(detune, c.currentTime + delay);\n      gain.gain.setValueAtTime(vol, c.currentTime + delay);\n      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + duration);\n      osc.start(c.currentTime + delay);\n      osc.stop(c.currentTime + delay + duration);\n    } catch(e) {}\n  }\n\n  function playNoise(duration, vol, freq=800, q=1) {\n    if (muted) return;\n    try {\n      const c = getCtx();\n      const bufSize = c.sampleRate * duration;\n      const buf = c.createBuffer(1, bufSize, c.sampleRate);\n      const data = buf.getChannelData(0);\n      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;\n      const src = c.createBufferSource();\n      src.buffer = buf;\n      const filter = c.createBiquadFilter();\n      filter.type = 'bandpass';\n      filter.frequency.value = freq;\n      filter.Q.value = q;\n      const gain = c.createGain();\n      gain.gain.setValueAtTime(vol, c.currentTime);\n      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);\n      src.connect(filter);\n      filter.connect(gain);\n      gain.connect(c.destination);\n      src.start();\n      src.stop(c.currentTime + duration);\n    } catch(e) {}\n  }\n\n  // \u2500\u2500 Sound Effects \u2500\u2500\n  const SFX = {\n    jump() {\n      playTone(220, 'sine', 0.08, 0.3);\n      playTone(440, 'sine', 0.15, 0.25, 0, 0.05);\n      playTone(660, 'sine', 0.1,  0.15, 0, 0.1);\n    },\n    coin() {\n      playTone(880,  'sine', 0.06, 0.3);\n      playTone(1320, 'sine', 0.1,  0.25, 0, 0.06);\n      playTone(1760, 'sine', 0.08, 0.2,  0, 0.12);\n    },\n    hurt() {\n      playTone(200, 'sawtooth', 0.06, 0.4);\n      playTone(150, 'sawtooth', 0.1,  0.3, 0, 0.06);\n      playTone(100, 'sawtooth', 0.15, 0.2, 0, 0.12);\n      playNoise(0.2, 0.15, 300, 2);\n    },\n    dead() {\n      [440,392,349,330,294,262,220].forEach((f,i) => {\n        playTone(f, 'sawtooth', 0.18, 0.35, 0, i*0.08);\n      });\n      playNoise(0.4, 0.2, 200, 1.5);\n    },\n    win() {\n      const melody = [523,659,784,1047,784,1047,1319];\n      melody.forEach((f,i) => playTone(f, 'sine', 0.18, 0.4, 0, i*0.12));\n      // sparkle\n      [2093,2637,3136].forEach((f,i) => playTone(f,'triangle',0.1,0.2,0,0.9+i*0.1));\n    },\n    levelstart() {\n      [330,392,523,659].forEach((f,i) => playTone(f,'triangle',0.12,0.3,0,i*0.1));\n    },\n    stomp() {\n      playTone(150, 'square', 0.05, 0.5);\n      playNoise(0.12, 0.3, 400, 3);\n    },\n    flag() {\n      [523,659,784,1047].forEach((f,i) => playTone(f,'sine',0.15,0.45,0,i*0.09));\n    }\n  };\n\n  // \u2500\u2500 Background Music \u2500\u2500\n  // Procedural chiptune loop using oscillators + LFO\n  function startBGM() {\n    if (muted || bgPlaying) return;\n    try {\n      const c = getCtx();\n      bgPlaying = true;\n\n      // Bass line\n      const bassNotes = [130, 146, 164, 174, 196, 174, 164, 146];\n      let bassIdx = 0;\n      const bassOsc = c.createOscillator();\n      const bassGain = c.createGain();\n      bassOsc.type = 'square';\n      bassOsc.frequency.value = bassNotes[0];\n      bassGain.gain.value = 0.06;\n      bassOsc.connect(bassGain);\n      bassGain.connect(c.destination);\n      bassOsc.start();\n      bgNodes.bassOsc = bassOsc;\n      bgNodes.bassGain = bassGain;\n\n      // Melody\n      const melodyNotes = [523,0,659,0,784,659,523,0,392,0,523,0,659,784,659,523];\n      let melIdx = 0;\n      const melOsc = c.createOscillator();\n      const melGain = c.createGain();\n      melOsc.type = 'triangle';\n      melOsc.frequency.value = melodyNotes[0] || 523;\n      melGain.gain.value = 0.07;\n      melOsc.connect(melGain);\n      melGain.connect(c.destination);\n      melOsc.start();\n      bgNodes.melOsc = melOsc;\n      bgNodes.melGain = melGain;\n\n      // Arpeggio (high sparkle)\n      const arpNotes = [1047,1319,1047,784,1047,1568,1319,1047];\n      let arpIdx = 0;\n      const arpOsc = c.createOscillator();\n      const arpGain = c.createGain();\n      arpOsc.type = 'sine';\n      arpOsc.frequency.value = arpNotes[0];\n      arpGain.gain.value = 0.04;\n      arpOsc.connect(arpGain);\n      arpGain.connect(c.destination);\n      arpOsc.start();\n      bgNodes.arpOsc = arpOsc;\n      bgNodes.arpGain = arpGain;\n\n      // Beat tick intervals\n      bgNodes.bassTimer = setInterval(() => {\n        if (!bgPlaying) return;\n        bassIdx = (bassIdx + 1) % bassNotes.length;\n        try { bassOsc.frequency.setValueAtTime(bassNotes[bassIdx], c.currentTime); } catch(e){}\n      }, 300);\n\n      bgNodes.melTimer = setInterval(() => {\n        if (!bgPlaying) return;\n        melIdx = (melIdx + 1) % melodyNotes.length;\n        const note = melodyNotes[melIdx];\n        try {\n          if (note) {\n            melOsc.frequency.setValueAtTime(note, c.currentTime);\n            melGain.gain.setValueAtTime(0.07, c.currentTime);\n            melGain.gain.exponentialRampToValueAtTime(0.03, c.currentTime + 0.18);\n          } else {\n            melGain.gain.setValueAtTime(0.001, c.currentTime);\n          }\n        } catch(e){}\n      }, 200);\n\n      bgNodes.arpTimer = setInterval(() => {\n        if (!bgPlaying) return;\n        arpIdx = (arpIdx + 1) % arpNotes.length;\n        try {\n          arpOsc.frequency.setValueAtTime(arpNotes[arpIdx], c.currentTime);\n          arpGain.gain.setValueAtTime(0.04, c.currentTime);\n          arpGain.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.08);\n        } catch(e){}\n      }, 100);\n\n    } catch(e) {}\n  }\n\n  function stopBGM() {\n    bgPlaying = false;\n    ['bassTimer','melTimer','arpTimer'].forEach(k => {\n      if(bgNodes[k]) clearInterval(bgNodes[k]);\n    });\n    ['bassOsc','melOsc','arpOsc'].forEach(k => {\n      try { if(bgNodes[k]) bgNodes[k].stop(); } catch(e){}\n    });\n    bgNodes = {};\n  }\n\n  function toggleMute() {\n    muted = !muted;\n    if (muted) stopBGM();\n    else startBGM();\n    return muted;\n  }\n\n  return { SFX, startBGM, stopBGM, toggleMute, getCtx, isMuted: () => muted };\n})();\n\n// \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 INIT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nshowScreen('homeScreen');\ndocument.getElementById('totalStars').textContent = totalStarsEarned;\n</script>\n<script>if(\"serviceWorker\" in navigator){navigator.serviceWorker.register(\"sw.js\");}</script>\n</body>\n</html>\n";
